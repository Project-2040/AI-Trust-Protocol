name: Pro AI Agent Crawler 0.1%

on:
  schedule:
    - cron: '0 */12 * * *' # প্রতি ১২ ঘণ্টা অন্তর অটো রান হবে
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 supabase lxml
        # আমরা সরাসরি রিকোয়েস্ট লাইব্রেরি ব্যবহার করছি যাতে ১ সেকেন্ডে ফেইল না করে

      - name: 4. Check File Existence (Debug Step)
        run: |
          ls -R
          echo "Checking if crawler.py exists..."
          if [ -f "crawler.py" ]; then echo "File found!"; else echo "File NOT found!"; exit 1; fi

      - name: 5. Run Crawler
        env:
          PYTHONUNBUFFERED: 1 # যাতে লগগুলো সাথে সাথে দেখা যায়
        run: |
          python crawler.py
