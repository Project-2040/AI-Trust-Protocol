name: AI Hunter Bot
on:
  schedule:
    - cron: '0 0 * * *' # প্রতিদিন রাত ১২টায় চলবে
  workflow_dispatch: # তুমি চাইলে নিজেও রান করতে পারবে

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 supabase
      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python scraper.py
