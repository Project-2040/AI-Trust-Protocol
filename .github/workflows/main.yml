name: Pro AI Agent Crawler 0.1%

on:
  schedule:
    - cron: '0 */12 * * *' # প্রতি ১২ ঘণ্টা অন্তর অটো আপডেট হবে
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Pro Dependencies
        run: |
          pip install playwright supabase
          playwright install --with-deps chromium

      - name: Execute High-Result Scraping
        run: python crawler.py
