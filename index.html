<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxiomChain | AI Trust Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
        .glow-cyan { text-shadow: 0 0 20px rgba(34, 211, 238, 0.4); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <nav class="w-full max-w-7xl flex justify-between items-center py-6 opacity-80 uppercase font-black italic">
        <div>AXIOM<span class="text-cyan-400">CHAIN</span></div>
        <div class="text-[10px] text-cyan-400 border border-cyan-500/30 px-3 py-1 rounded-full">MD. SARIFUL SHEIKH JENON</div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center w-full max-w-2xl">
        <h1 class="text-4xl font-black mb-8 tracking-tighter glow-cyan uppercase italic text-center leading-none">
            AXIOM AI <br><span class="text-gray-600 italic text-2xl">CORE INTERFACE</span>
        </h1>

        <div id="chat-window" class="w-full glass min-h-[300px] max-h-[450px] overflow-y-auto p-6 rounded-3xl mb-6 flex flex-col gap-4 border-cyan-500/10 shadow-2xl">
            <p class="text-cyan-400 font-mono text-[10px] opacity-60 italic text-center border-b border-white/5 pb-2 uppercase">Protocol Online: Node 0.0.8375963</p>
        </div>

        <div class="w-full relative">
            <input type="text" id="user-input" placeholder="ENTER COMMAND..." 
                class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-sm font-mono tracking-wide focus:outline-none focus:border-cyan-400 transition-all uppercase placeholder:text-gray-700">
            <button id="send-btn" class="absolute right-3 top-3 bg-cyan-400 text-black px-6 py-2 rounded-xl text-[10px] font-black hover:scale-105 active:scale-95 transition-all">EXECUTE</button>
        </div>
    </main>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        async function askAI() {
            const query = inputField.value.trim();
            if (!query) return;

            addMessage(`YOU: ${query}`, "text-white/60 text-right pr-3 border-r-2 border-white/10");
            inputField.value = "";
            sendBtn.innerText = "WAIT...";
            sendBtn.disabled = true;

            const aiMsgRef = addMessage("> INITIALIZING CORE RESPONSE...", "text-cyan-400 animate-pulse uppercase");

            try {
                // এখানে আমরা আপনার সেট করা পার্সোনালাইজড রেসপন্স এবং এআই লজিক সেট করছি
                setTimeout(() => {
                    let responseText = generateResponse(query);
                    aiMsgRef.innerText = "> AXIOM AI: " + responseText;
                    aiMsgRef.classList.remove("animate-pulse");
                    sendBtn.innerText = "EXECUTE";
                    sendBtn.disabled = false;
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }, 1000);
            } catch (error) {
                aiMsgRef.innerText = "> ERROR: PROTOCOL TIMEOUT.";
                sendBtn.disabled = false;
            }
        }

        function generateResponse(q) {
            const input = q.toLowerCase();
            if (input.includes("hi") || input.includes("hello")) return "GREETINGS FOUNDER MD. SARIFUL SHEIKH JENON. AXIOM CORE IS AT YOUR SERVICE.";
            if (input.includes("how are you")) return "ALL SYSTEMS OPERATIONAL. NODE 0.0.8375963 IS STABLE AND READY FOR VISION 2040.";
            if (input.includes("date") || input.includes("time")) return `CURRENT SYSTEM STAMP: ${new Date().toLocaleString()}`;
            if (input.includes("vision")) return "VISION 2040: ESTABLISHING DECENTRALIZED TRUST THROUGH IMMUTABLE AI-LEDGER INTEGRATION.";
            
            return `COMMAND "${q.toUpperCase()}" ANALYZED. NO DISCREPANCIES FOUND IN THE LEDGER.`;
        }

        function addMessage(text, className) {
            const msg = document.createElement('p');
            msg.className = `text-xs font-mono leading-relaxed ${className}`;
            msg.innerText = text;
            chatWindow.appendChild(msg);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return msg;
        }

        sendBtn.onclick = askAI;
        inputField.onkeypress = (e) => { if (e.key === 'Enter') askAI(); };
    </p>
</body>
</html>
