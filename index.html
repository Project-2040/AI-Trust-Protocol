<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxiomChain | AI Trust Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
        .glow-cyan { text-shadow: 0 0 20px rgba(34, 211, 238, 0.4); }
        input:focus { outline: none; border-color: #22d3ee; box-shadow: 0 0 15px rgba(34, 211, 238, 0.2); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <nav class="w-full max-w-7xl flex justify-between items-center py-6 opacity-80">
        <div class="text-xl font-black italic uppercase tracking-tighter">AXIOM<span class="text-cyan-400">CHAIN</span></div>
        <div class="text-[10px] font-bold tracking-widest text-cyan-400 border border-cyan-500/30 px-3 py-1 rounded-full uppercase">Node 0.0.8375963</div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center w-full max-w-2xl">
        <h1 class="text-4xl md:text-6xl font-black mb-8 tracking-tighter glow-cyan uppercase italic text-center leading-none">
            AI INTERFACE <br><span class="text-gray-600 italic">V 1.0</span>
        </h1>

        <div id="chat-window" class="w-full glass min-h-[150px] max-h-[300px] overflow-y-auto p-6 rounded-3xl mb-6 flex flex-col gap-4 border-cyan-500/10">
            <p class="text-cyan-400 font-mono text-xs opacity-60 italic">> SYSTEM IDLE. WAITING FOR COMMAND...</p>
        </div>

        <div class="w-full relative">
            <input type="text" id="user-input" placeholder="ASK SOMETHING TO AXIOM AI..." 
                class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-sm font-mono tracking-wide transition-all uppercase placeholder:text-gray-600">
            <button onclick="askAI()" class="absolute right-3 top-3 bg-cyan-400 text-black px-6 py-2 rounded-xl text-[10px] font-black hover:bg-white transition-all">SEND</button>
        </div>
    </main>

    <footer class="py-8 mt-4">
        <p class="text-[9px] tracking-[0.4em] uppercase font-black opacity-30 text-center">
            FOUNDER: MD. SARIFUL SHEIKH JENON | VISION 2040
        </p>
    </footer>

    <script>
        async function askAI() {
            const inputField = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            const query = inputField.value.trim();
            
            if (!query) return;

            // User Message Display
            const userMsg = document.createElement('p');
            userMsg.className = "text-white/60 text-xs font-mono uppercase text-right border-r-2 border-white/20 pr-3";
            userMsg.innerText = `YOU: ${query}`;
            chatWindow.appendChild(userMsg);
            
            inputField.value = "";
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // AI Synchronizing Indicator
            const aiMsg = document.createElement('p');
            aiMsg.className = "text-cyan-400 text-xs font-mono leading-relaxed";
            aiMsg.innerText = "> INITIALIZING PROTOCOL...";
            chatWindow.appendChild(aiMsg);

            // Here we use the Gemini API Key from Vercel
            // Note: In real world, we would call an API route. 
            // For now, this is a simulated response that is ready for 
            // the next step where we connect the server.
            
            setTimeout(() => {
                aiMsg.innerText = `> AXIOM AI: COMMAND RECEIVED. DATA SCANNING IN PROGRESS FOR NODE 0.0.8375963. ACCESS GRANTED FOR MD. SARIFUL SHEIKH JENON.`;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }, 1000);
        }

        // Allow Enter key to send
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') askAI();
        });
    </script>
</body>
</html>
