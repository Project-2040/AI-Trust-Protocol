<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom AI - Core Interface</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #000; color: #00f2ff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #chat-box { width: 90%; max-width: 600px; height: 400px; border: 1px solid #00f2ff; overflow-y: auto; padding: 15px; background: rgba(0, 242, 255, 0.05); border-radius: 10px; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .input-area { display: flex; width: 90%; max-width: 600px; margin-top: 20px; }
        input { flex: 1; padding: 12px; background: #111; border: 1px solid #00f2ff; color: #fff; border-radius: 5px 0 0 5px; outline: none; }
        button { padding: 12px 20px; background: #00f2ff; color: #000; border: none; border-radius: 0 5px 5px 0; font-weight: bold; cursor: pointer; }
        .msg { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>AXIOM AI CORE</h1>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Enter Command..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">EXECUTE</button>
    </div>

    <script>
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = inputField.value;
            if (!message) return;

            chatBox.innerHTML += `<div class="msg"><b>YOU:</b> ${message}</div>`;
            inputField.value = '';

            try {
                // এখানে /api/chat ব্যবহার করা হয়েছে (.js ছাড়া)
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await res.json();
                chatBox.innerHTML += `<div class="msg"><b>AXIOM AI:</b> ${data.response}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (err) {
                chatBox.innerHTML += `<div class="msg" style="color:red;"><b>SYSTEM:</b> Error connecting to core.</div>`;
            }
        }
    </script>
</body>
</html>
