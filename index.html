<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxiomChain | AI Trust Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
        .glow-cyan { text-shadow: 0 0 20px rgba(34, 211, 238, 0.4); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <nav class="w-full max-w-7xl flex justify-between items-center py-6 opacity-80 uppercase font-black italic">
        <div class="tracking-tighter">AXIOM<span class="text-cyan-400">CHAIN</span></div>
        <div class="text-[9px] text-cyan-400 border border-cyan-500/30 px-3 py-1 rounded-full tracking-widest uppercase">
            FOUNDER: MD. SARIFUL SHEIKH JENON
        </div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center w-full max-w-2xl">
        <h1 class="text-4xl font-black mb-8 tracking-tighter glow-cyan uppercase italic text-center leading-none">
            AXIOM AI <br><span class="text-gray-600 italic text-2xl">CORE INTERFACE</span>
        </h1>

        <div id="chat-window" class="w-full glass min-h-[300px] max-h-[400px] overflow-y-auto p-6 rounded-3xl mb-6 flex flex-col gap-4 border-cyan-500/10 shadow-2xl">
            <p class="text-cyan-400 font-mono text-[10px] opacity-60 italic text-center border-b border-white/5 pb-2 uppercase tracking-widest">
                SYSTEM ONLINE: NODE 0.0.8375963
            </p>
        </div>

        <div class="w-full relative">
            <input type="text" id="user-input" placeholder="ENTER COMMAND..." 
                class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-sm font-mono tracking-wide focus:outline-none focus:border-cyan-400 transition-all uppercase placeholder:text-gray-700 text-white">
            <button onclick="handleExecution()" id="send-btn" 
                class="absolute right-3 top-3 bg-cyan-400 text-black px-6 py-2 rounded-xl text-[10px] font-black hover:bg-white active:scale-95 transition-all">
                EXECUTE
            </button>
        </div>
    </main>

    <script>
        const chatBox = document.getElementById('chat-window');
        const inputField = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');

        function printMsg(text, style) {
            const p = document.createElement('p');
            p.className = `text-[11px] font-mono leading-relaxed uppercase ${style}`;
            p.innerText = text;
            chatBox.appendChild(p);
            chatBox.scrollTop = chatBox.scrollHeight;
            return p;
        }

        async function handleExecution() {
            const val = inputField.value.trim();
            if (!val) return;

            // User Message Display
            printMsg(`YOU: ${val}`, "text-white/50 text-right pr-3 border-r-2 border-white/10");
            inputField.value = "";
            
            // Disable UI while thinking
            btn.innerText = "WAITING...";
            btn.disabled = true;
            const loader = printMsg("> SYNCHRONIZING WITH CORE...", "text-cyan-400 animate-pulse tracking-widest");

            try {
                // Connecting to your /api/chat.js backend
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: val })
                });
                
                const data = await res.json();
                
                // Show AI Response from Gemini
                loader.innerText = "> AXIOM AI: " + (data.response || "SYSTEM DISCONNECTED");
                
            } catch (err) {
                loader.innerText = "> ERROR: CONNECTION LOST TO HEDERA NODE.";
            }

            // Reset UI
            loader.classList.remove("animate-pulse");
            btn.innerText = "EXECUTE";
            btn.disabled = false;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Enter key support
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleExecution();
        });
    </script>
</body>
</html>
