<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM AI CORE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Courier New', monospace; 
            background: #000; 
            color: #00f2ff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
        }
        h1 { margin-bottom: 20px; letter-spacing: 5px; text-shadow: 0 0 10px #00f2ff; font-size: 24px; }
        #chat-box { 
            width: 90%; 
            max-width: 600px; 
            height: 60vh; 
            border: 2px solid #00f2ff; 
            overflow-y: auto; 
            padding: 20px; 
            background: rgba(0, 0, 0, 0.9); 
            border-radius: 15px; 
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.2);
            margin-bottom: 20px;
        }
        .input-area { 
            display: flex; 
            width: 90%; 
            max-width: 600px; 
            border: 2px solid #00f2ff; 
            border-radius: 10px; 
            background: #000;
        }
        input { 
            flex: 1; 
            padding: 15px; 
            background: transparent; 
            border: none; 
            color: #fff; 
            font-size: 16px; 
            outline: none; 
        }
        button { 
            padding: 0 25px; 
            background: #00f2ff; 
            color: #000; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
        }
        .msg { margin-bottom: 15px; word-wrap: break-word; }
        .user { color: #fff; }
        .ai { color: #00f2ff; }
    </style>
</head>
<body>
    <h1>AXIOM AI CORE</h1>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="ENTER COMMAND..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">EXECUTE</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const inputField = document.getElementById('user-input');

        async function sendMessage() {
            const message = inputField.value.trim();
            if (!message) return;

            // User Message display
            chatBox.innerHTML += `<div class="msg user"><b>YOU:</b> ${message}</div>`;
            inputField.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await res.json();
                chatBox.innerHTML += `<div class="msg ai"><b>AXIOM AI:</b> ${data.response}</div>`;
            } catch (err) {
                chatBox.innerHTML += `<div class="msg" style="color:#ff4444;"><b>SYSTEM:</b> CORE_CONNECTION_LOST</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
