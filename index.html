<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM AI TRUST PROTOCOL | 2040 ENGINE</title>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        
        header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(0,242,255,0.2); background: rgba(0,0,0,0.8); sticky: top; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 5px; color: var(--neon); text-shadow: 0 0 15px var(--neon); }

        .dashboard { padding: 40px 20px; max-width: 1200px; margin: auto; }
        .hero { text-align: center; margin-bottom: 50px; }
        .hero h1 { font-size: 2.5em; color: #fff; margin-bottom: 10px; }
        .hero p { color: #888; font-size: 1.1em; }

        /* Trust Score Table */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 10px; padding: 20px; transition: 0.3s; position: relative; overflow: hidden; }
        .card:hover { border-color: var(--neon); box-shadow: 0 0 20px rgba(0,242,255,0.1); }
        .card h3 { color: var(--neon); margin: 0 0 10px 0; }
        .score { position: absolute; top: 15px; right: 15px; font-size: 1.5em; font-weight: bold; color: #39FF14; }
        .stat-line { height: 4px; background: #222; border-radius: 2px; margin: 10px 0; overflow: hidden; }
        .stat-fill { height: 100%; background: var(--neon); width: 0%; transition: 1.5s; }

        .badge { display: inline-block; padding: 4px 10px; background: rgba(0,242,255,0.1); color: var(--neon); border-radius: 4px; font-size: 0.8em; margin-right: 5px; }

        /* Console Footer */
        .console { margin-top: 50px; background: #000; padding: 20px; border-radius: 5px; border-left: 3px solid var(--neon); font-size: 0.9em; color: #0f0; }
        .cursor { display: inline-block; width: 8px; height: 18px; background: #0f0; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<header>
    <div class="logo">AXIOM TRUST PROTOCOL</div>
</header>

<div class="dashboard">
    <div class="hero">
        <h1>AI REPUTATION ENGINE <span style="font-size: 0.5em; vertical-align: middle; opacity: 0.6;">v2.0.40</span></h1>
        <p>The Global Standard for Autonomous Agent Verification & Trust Scoring.</p>
    </div>

    <div class="grid" id="agent-grid">
        </div>

    <div class="console">
        <div>> SYSTEM STATUS: ACTIVE</div>
        <div>> PROTOCOL: BLOCKCHAIN SECURED</div>
        <div>> MONITORING: 1.2M+ AGENTS WORLDWIDE...<span class="cursor"></span></div>
    </div>
</div>

<script>
    const agents = [
        { name: "Neural-Core X", type: "FinTech", safety: 98, speed: 94, score: 9.6 },
        { name: "Synth-Legal v4", type: "Legal AI", safety: 99, speed: 82, score: 9.2 },
        { name: "AutoTrade Pro", type: "Trading", safety: 85, speed: 99, score: 8.9 },
        { name: "DeepCheck AI", type: "Security", safety: 97, speed: 88, score: 9.4 }
    ];

    const grid = document.getElementById('agent-grid');

    function loadAgents() {
        grid.innerHTML = agents.map(agent => `
            <div class="card">
                <div class="score">${agent.score}</div>
                <h3>${agent.name}</h3>
                <span class="badge">${agent.type}</span>
                <span class="badge">SECURED</span>
                <div style="margin-top: 20px; font-size: 0.8em; color: #666;">Safety Index</div>
                <div class="stat-line"><div class="stat-fill" style="width: ${agent.safety}%"></div></div>
                <div style="font-size: 0.8em; color: #666;">Execution Speed</div>
                <div class="stat-line"><div class="stat-fill" style="width: ${agent.speed}%"></div></div>
            </div>
        `).join('');
    }

    window.onload = loadAgents;
</script>

</body>
</html>
