<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxiomChain | AI Trust Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .hero-gradient { background: radial-gradient(circle at 50% 50%, #0d0d0d 0%, #000 100%); }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); transition: all 0.4s ease; }
        .glow-cyan { text-shadow: 0 0 20px rgba(34, 211, 238, 0.4); }
        .led-active { width: 8px; height: 8px; background: #22d3ee; border-radius: 50%; box-shadow: 0 0 10px #22d3ee; }
    </style>
</head>
<body class="hero-gradient min-h-screen flex flex-col items-center p-6">

    <nav class="w-full max-w-7xl flex justify-between items-center py-8 px-4">
        <div class="text-xl font-black italic uppercase">AXIOM<span class="text-cyan-400">CHAIN</span></div>
        <div class="flex items-center gap-2 glass px-4 py-2 rounded-full">
            <div class="led-active"></div>
            <span class="text-[10px] font-bold tracking-widest text-cyan-400">HEDERA ACTIVE</span>
        </div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center text-center w-full max-w-4xl">
        <h1 class="text-6xl md:text-8xl font-black mb-6 tracking-tighter leading-none glow-cyan uppercase">
            VALIDATE <br><span class="text-gray-600">EVERYTHING.</span>
        </h1>

        <div id="ai-response" class="hidden w-full glass p-8 rounded-3xl mb-10 text-left border-cyan-500/20">
            <p id="typing-text" class="font-mono text-cyan-400 text-sm leading-relaxed"></p>
        </div>

        <div class="flex flex-col gap-4 w-full max-w-xs">
            <button onclick="activateAI()" id="main-btn" class="bg-white text-black font-black py-5 rounded-2xl text-xs tracking-widest hover:scale-105 transition-all uppercase">
                INITIALIZE AI BRAIN
            </button>
            <button class="glass py-5 rounded-2xl text-xs font-bold tracking-widest text-gray-400">EXPLORE LEDGER</button>
        </div>
    </main>

    <footer class="py-10 opacity-50">
        <p class="text-[10px] tracking-[0.3em] uppercase font-black">
            FOUNDER: MD. SARIFUL SHEIKH JENON | 0.0.8375963
        </p>
    </footer>

    <script>
        function activateAI() {
            const btn = document.getElementById('main-btn');
            const response = document.getElementById('ai-response');
            const text = document.getElementById('typing-text');
            
            btn.innerText = "SYNCHRONIZING...";
            btn.disabled = true;

            // এআই এর কাজ সিমুলেট করা হচ্ছে কারণ আমরা কেবল ল্যান্ডিং পেজে আছি
            setTimeout(() => {
                response.classList.remove('hidden');
                let message = "> ACCESS GRANTED. Welcome, Founder MD. SARIFUL SHEIKH JENON. AxiomChain protocol is now monitoring Hedera Node 0.0.8375963. AI Trust Layer is online for Vision 2040.";
                let i = 0;
                text.innerHTML = "";
                
                function type() {
                    if (i < message.length) {
                        text.innerHTML += message.charAt(i);
                        i++;
                        setTimeout(type, 30);
                    }
                }
                type();
                btn.innerText = "SYSTEM OPERATIONAL";
            }, 1500);
        }
    </script>
</body>
</html>
