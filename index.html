<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --ink:#020509;
  --ink2:#07101a;
  --ink3:#0d1e2e;
  --c:#00e5ff;
  --c2:#39ff14;
  --c3:#ff3864;
  --c4:#bf5af2;
  --gold:#ffd60a;
  --t1:#ffffff;
  --t2:#94b4c4;
  --t3:#4a6878;
  --mono:'Share Tech Mono',monospace;
  --disp:'Syne',sans-serif;
  --body:'Space Grotesk',sans-serif;
  --r:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;font-size:16px;}
body{background:var(--ink);color:var(--t2);font-family:var(--body);overflow-x:hidden;min-height:100vh;}

/* ═══ WEBGL CANVAS ═══ */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ═══ GRAIN OVERLAY ═══ */
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

/* ═══ HEADER ═══ */
header{
  position:fixed;top:0;left:0;right:0;z-index:900;
  padding:0 clamp(16px,4vw,48px);height:60px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(2,5,9,0.7);backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid rgba(0,229,255,0.08);
  transition:background 0.3s;
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{
  width:32px;height:32px;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.logo-mark svg{width:32px;height:32px;}
.logo-mark .lm-outer{fill:none;stroke:var(--c);stroke-width:1.5;animation:spinSlow 20s linear infinite;}
.logo-mark .lm-inner{fill:var(--c);opacity:0.9;}
.logo-mark .lm-dot{fill:var(--ink);width:6px;height:6px;}
@keyframes spinSlow{to{transform:rotate(360deg);transform-origin:center;}}
.logo-txt{font-family:var(--disp);font-size:15px;font-weight:800;letter-spacing:1px;color:var(--t1);}
.logo-txt span{color:var(--c);}
.nav{display:flex;gap:2px;align-items:center;}
.nav a{font-family:var(--mono);font-size:9px;letter-spacing:2px;padding:7px 12px;color:var(--t3);text-decoration:none;text-transform:uppercase;transition:color 0.2s;border-radius:4px;}
.nav a:hover{color:var(--c);background:rgba(0,229,255,0.06);}
.hdr-right{display:flex;align-items:center;gap:12px;}
.live-pill{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--c2);padding:5px 10px;border:1px solid rgba(57,255,20,0.2);border-radius:20px;background:rgba(57,255,20,0.05);}
.live-dot{width:5px;height:5px;background:var(--c2);border-radius:50%;box-shadow:0 0 6px var(--c2);animation:ldot 2s infinite;}
@keyframes ldot{0%,100%{opacity:1;}50%{opacity:0.2;}}
.btn-cta{font-family:var(--mono);font-size:9px;letter-spacing:2px;padding:8px 16px;background:var(--c);color:var(--ink);border:none;border-radius:4px;cursor:pointer;font-weight:700;text-decoration:none;text-transform:uppercase;transition:all 0.2s;white-space:nowrap;}
.btn-cta:hover{background:#fff;box-shadow:0 0 20px rgba(0,229,255,0.4);}

/* ═══ HERO ═══ */
.hero{
  position:relative;z-index:2;
  min-height:100svh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:80px clamp(16px,5vw,60px) 60px;
  overflow:hidden;
}
.hero-globe{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;opacity:0.25;
}
#globe-canvas{width:min(700px,110vw);height:min(700px,110vw);}

.hero-eyebrow{
  font-family:var(--mono);font-size:clamp(8px,1.5vw,11px);
  letter-spacing:5px;color:var(--c);text-transform:uppercase;
  margin-bottom:24px;opacity:0;
  animation:fadeUp 1s 0.2s cubic-bezier(0.16,1,0.3,1) forwards;
}
.hero-title{
  font-family:var(--disp);
  font-size:clamp(2.8rem,10vw,8.5rem);
  font-weight:800;line-height:0.95;
  text-transform:uppercase;letter-spacing:-2px;
  margin-bottom:24px;
  opacity:0;animation:fadeUp 1s 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
}
.hero-title .t-white{color:var(--t1);display:block;}
.hero-title .t-glow{
  display:block;color:var(--c);
  text-shadow:0 0 40px rgba(0,229,255,0.5),0 0 80px rgba(0,229,255,0.2);
  -webkit-text-stroke:1px rgba(0,229,255,0.3);
}
.hero-title .t-outline{
  display:block;
  -webkit-text-stroke:1px rgba(255,255,255,0.2);
  color:transparent;
  font-size:0.55em;letter-spacing:8px;font-weight:400;margin-top:12px;
}
.hero-desc{
  max-width:560px;font-size:clamp(0.9rem,2vw,1.1rem);
  color:var(--t2);line-height:1.8;font-weight:300;
  margin-bottom:44px;opacity:0;
  animation:fadeUp 1s 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
}
.hero-actions{
  display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
  opacity:0;animation:fadeUp 1s 0.65s cubic-bezier(0.16,1,0.3,1) forwards;
}
.btn-primary{
  font-family:var(--mono);font-size:10px;letter-spacing:3px;
  padding:15px 40px;background:var(--c);color:var(--ink);
  border:none;border-radius:4px;cursor:pointer;font-weight:700;
  text-decoration:none;text-transform:uppercase;
  transition:all 0.3s;position:relative;overflow:hidden;
}
.btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent);pointer-events:none;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,229,255,0.4);}
.btn-secondary{
  font-family:var(--mono);font-size:10px;letter-spacing:3px;
  padding:15px 40px;background:rgba(255,255,255,0.05);
  color:var(--t2);border:1px solid rgba(255,255,255,0.1);
  border-radius:4px;cursor:pointer;text-decoration:none;
  text-transform:uppercase;transition:all 0.3s;
}
.btn-secondary:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.2);color:var(--t1);}
.hero-scroll{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:8px;letter-spacing:3px;color:var(--t3);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  animation:scrollBounce 2s infinite;
}
.hero-scroll::after{content:'';width:1px;height:30px;background:linear-gradient(var(--c),transparent);}
@keyframes scrollBounce{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(6px);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

/* ═══ TICKER ═══ */
.ticker{
  position:relative;z-index:2;overflow:hidden;
  padding:12px 0;background:rgba(0,229,255,0.03);
  border-top:1px solid rgba(0,229,255,0.07);
  border-bottom:1px solid rgba(0,229,255,0.07);
}
.ticker-inner{display:flex;gap:60px;animation:tkr 35s linear infinite;white-space:nowrap;width:max-content;}
.tk{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--t3);display:flex;align-items:center;gap:10px;}
.tk i{color:var(--c);font-style:normal;}
@keyframes tkr{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* ═══ STATS ═══ */
.stats{position:relative;z-index:2;display:grid;grid-template-columns:repeat(5,1fr);}
.stat{
  padding:clamp(20px,4vw,40px) 20px;text-align:center;
  border-right:1px solid rgba(0,229,255,0.06);
  border-bottom:1px solid rgba(0,229,255,0.06);
  position:relative;overflow:hidden;transition:background 0.3s;
}
.stat:last-child{border-right:none;}
.stat:hover{background:rgba(0,229,255,0.025);}
.stat::before{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--c);transition:width 0.4s;}
.stat:hover::before{width:100%;}
.sv{font-family:var(--disp);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;color:var(--c);display:block;line-height:1;text-shadow:0 0 20px rgba(0,229,255,0.3);}
.sl{font-family:var(--mono);font-size:8px;letter-spacing:3px;color:var(--t3);text-transform:uppercase;margin-top:8px;display:block;}

/* ═══ MAIN LAYOUT ═══ */
.main-wrap{position:relative;z-index:2;max-width:1400px;margin:0 auto;padding:0 clamp(16px,4vw,48px);}

/* ═══ SECTION LABEL ═══ */
.sec-label{
  display:flex;align-items:center;gap:12px;padding:50px 0 28px;
}
.sec-label-txt{font-family:var(--mono);font-size:9px;letter-spacing:4px;color:var(--c);text-transform:uppercase;white-space:nowrap;}
.sec-label-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(0,229,255,0.2),transparent);}

/* ═══ SEARCH + FILTER ═══ */
.search-area{margin-bottom:28px;}
.search-box{
  position:relative;max-width:640px;margin:0 auto 24px;
}
.search-input{
  width:100%;padding:16px 52px 16px 20px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(0,229,255,0.12);
  border-radius:var(--r);color:var(--t1);
  font-family:var(--mono);font-size:12px;letter-spacing:1px;
  outline:none;transition:all 0.3s;
}
.search-input:focus{border-color:rgba(0,229,255,0.4);background:rgba(0,229,255,0.04);box-shadow:0 0 0 4px rgba(0,229,255,0.06);}
.search-input::placeholder{color:var(--t3);}
.search-icon{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:16px;pointer-events:none;}
.cats{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;}
.cat-btn{
  font-family:var(--mono);font-size:8px;letter-spacing:2px;
  padding:7px 14px;border:1px solid rgba(255,255,255,0.08);
  color:var(--t3);text-transform:uppercase;cursor:pointer;
  border-radius:20px;background:transparent;transition:all 0.2s;
}
.cat-btn:hover,.cat-btn.active{border-color:var(--c);color:var(--c);background:rgba(0,229,255,0.06);}
.filter-row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
.filter-count{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:2px;}
.filter-count b{color:var(--c);}
.sort-select{
  font-family:var(--mono);font-size:9px;padding:8px 14px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:6px;color:var(--t2);outline:none;cursor:pointer;
  transition:border-color 0.2s;
}
.sort-select:focus{border-color:var(--c);}

/* ═══ CARD GRID ═══ */
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:16px;padding-bottom:80px;
}

/* ═══ AI CARD ═══ */
.ai-card{
  background:var(--ink2);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:12px;padding:24px;
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.35s,border-color 0.35s;
  position:relative;overflow:hidden;cursor:pointer;
  transform-style:preserve-3d;
  will-change:transform;
}
.ai-card::before{
  content:'';position:absolute;
  top:-1px;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,var(--c),transparent);
  opacity:0;transition:opacity 0.35s;
}
.ai-card:hover{
  transform:translateY(-8px) rotateX(2deg);
  box-shadow:0 24px 48px rgba(0,0,0,0.5),0 0 0 1px rgba(0,229,255,0.15),0 0 40px rgba(0,229,255,0.06);
  border-color:rgba(0,229,255,0.2);
}
.ai-card:hover::before{opacity:1;}
.ai-card.featured{
  background:linear-gradient(135deg,rgba(7,16,26,1),rgba(12,8,22,1));
  border-color:rgba(191,90,242,0.15);
}
.ai-card.featured:hover{border-color:rgba(191,90,242,0.35);box-shadow:0 24px 48px rgba(0,0,0,0.5),0 0 40px rgba(191,90,242,0.08);}
.feat-badge{
  position:absolute;top:0;right:0;
  font-family:var(--mono);font-size:7px;letter-spacing:2px;
  padding:5px 12px;background:rgba(191,90,242,0.12);
  color:var(--c4);border-bottom-left-radius:8px;
  border-top-right-radius:11px;border-left:1px solid rgba(191,90,242,0.2);
  border-bottom:1px solid rgba(191,90,242,0.2);
}

/* CARD HEADER */
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px;}
.card-id{display:flex;align-items:center;gap:12px;min-width:0;}
.agent-icon{
  width:44px;height:44px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-size:1rem;font-weight:800;
  flex-shrink:0;position:relative;
  background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.12);
  color:var(--c);transition:all 0.3s;
}
.ai-card:hover .agent-icon{transform:scale(1.05);}
.agent-info{min-width:0;}
.agent-name{font-family:var(--disp);font-size:0.9rem;font-weight:700;color:var(--t1);letter-spacing:0.3px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.agent-cat{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:2px;margin-top:3px;text-transform:uppercase;}

/* SCORE RING */
.score-ring{position:relative;width:58px;height:58px;flex-shrink:0;}
.score-ring svg{transform:rotate(-90deg);display:block;}
.ring-bg{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:3;}
.ring-fg{fill:none;stroke-width:3;stroke-linecap:round;stroke-dasharray:144;stroke-dashoffset:144;transition:stroke-dashoffset 1.8s cubic-bezier(0.34,1.56,0.64,1);}
.score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-num{font-family:var(--disp);font-size:14px;font-weight:800;line-height:1;}
.score-lbl{font-family:var(--mono);font-size:6px;letter-spacing:1px;color:var(--t3);margin-top:1px;}

/* TAGS */
.card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.tag{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;padding:3px 8px;border-radius:4px;text-transform:uppercase;}
.tag-default{background:rgba(0,229,255,0.07);border:1px solid rgba(0,229,255,0.12);color:rgba(0,229,255,0.7);}
.tag-verified{background:rgba(57,255,20,0.07);border:1px solid rgba(57,255,20,0.15);color:rgba(57,255,20,0.8);}
.tag-caution{background:rgba(255,214,10,0.07);border:1px solid rgba(255,214,10,0.15);color:rgba(255,214,10,0.8);}
.tag-danger{background:rgba(255,56,100,0.07);border:1px solid rgba(255,56,100,0.15);color:rgba(255,56,100,0.8);}

/* DESC */
.card-desc{font-size:0.8rem;color:var(--t3);line-height:1.65;margin-bottom:18px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* METRICS */
.card-metrics{margin-bottom:18px;}
.metric{margin-bottom:9px;}
.metric-head{display:flex;justify-content:space-between;font-family:var(--mono);font-size:7px;color:var(--t3);letter-spacing:1px;margin-bottom:4px;}
.metric-head span:last-child{color:var(--t2);}
.metric-track{height:3px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;}
.metric-bar{height:100%;border-radius:2px;transform:scaleX(0);transform-origin:left;transition:transform 1.6s cubic-bezier(0.34,1.56,0.64,1);}

/* CARD FOOTER */
.card-footer{display:flex;gap:8px;}
.card-btn{
  flex:1;padding:10px 8px;text-align:center;
  font-family:var(--mono);font-size:8px;letter-spacing:2px;
  text-transform:uppercase;border-radius:6px;cursor:pointer;
  transition:all 0.2s;text-decoration:none;display:block;border:none;
}
.card-btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.08);color:var(--t3);}
.card-btn-outline:hover{border-color:var(--c);color:var(--c);background:rgba(0,229,255,0.05);}
.card-btn-fill{background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.2);color:var(--c);}
.card-btn-fill:hover{background:var(--c);color:var(--ink);border-color:var(--c);}

/* ═══ WHY SECTION ═══ */
.why-section{
  position:relative;z-index:2;
  padding:80px clamp(16px,4vw,48px);
  border-top:1px solid rgba(255,255,255,0.04);
}
.why-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:1fr 1.1fr;gap:80px;align-items:center;}
.why-left h2{font-family:var(--disp);font-size:clamp(1.8rem,4vw,3rem);font-weight:800;color:var(--t1);line-height:1.15;margin-bottom:20px;}
.why-left h2 em{font-style:normal;color:var(--c);}
.why-left p{font-size:0.9rem;color:var(--t2);line-height:1.9;margin-bottom:14px;font-weight:300;}
.why-feats{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.wfeat{
  padding:20px;border-radius:10px;
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.04);
  transition:all 0.3s;
}
.wfeat:hover{background:rgba(0,229,255,0.04);border-color:rgba(0,229,255,0.1);transform:translateY(-3px);}
.wfeat-num{font-family:var(--disp);font-size:1.8rem;font-weight:800;color:rgba(0,229,255,0.1);display:block;margin-bottom:8px;line-height:1;}
.wfeat-title{font-family:var(--disp);font-size:0.65rem;font-weight:700;letter-spacing:2px;color:var(--t1);margin-bottom:6px;text-transform:uppercase;}
.wfeat-desc{font-size:0.78rem;color:var(--t3);line-height:1.6;}

/* ═══ HOW SECTION ═══ */
.how-section{
  position:relative;z-index:2;
  padding:80px clamp(16px,4vw,48px);
  background:rgba(0,229,255,0.015);
  border-top:1px solid rgba(0,229,255,0.06);
  border-bottom:1px solid rgba(0,229,255,0.06);
}
.how-inner{max-width:1200px;margin:0 auto;}
.how-title{font-family:var(--mono);font-size:9px;letter-spacing:5px;color:var(--c);text-align:center;text-transform:uppercase;margin-bottom:60px;}
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:0;position:relative;}
.steps::before{content:'';position:absolute;top:28px;left:12.5%;right:12.5%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.3),transparent);}
.step{text-align:center;padding:0 20px;}
.step-icon{
  width:56px;height:56px;border-radius:50%;
  background:var(--ink);border:1px solid rgba(0,229,255,0.2);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  font-family:var(--disp);font-size:1rem;font-weight:800;color:var(--c);
  position:relative;z-index:1;
  box-shadow:0 0 0 6px rgba(2,5,9,1);
}
.step-title{font-family:var(--disp);font-size:0.7rem;font-weight:700;letter-spacing:2px;color:var(--t1);margin-bottom:8px;text-transform:uppercase;}
.step-desc{font-size:0.78rem;color:var(--t3);line-height:1.6;}

/* ═══ SUBMIT SECTION ═══ */
.submit-section{
  position:relative;z-index:2;
  padding:80px clamp(16px,4vw,48px);
  border-top:1px solid rgba(255,255,255,0.04);
}
.submit-inner{max-width:700px;margin:0 auto;}
.submit-inner .sec-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:4px;color:var(--c);text-transform:uppercase;margin-bottom:14px;}
.submit-inner h2{font-family:var(--disp);font-size:clamp(1.6rem,3vw,2.2rem);font-weight:800;color:var(--t1);margin-bottom:10px;}
.submit-inner p{font-size:0.9rem;color:var(--t2);margin-bottom:36px;line-height:1.7;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.form-group{margin-bottom:14px;}
.form-group label{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:rgba(0,229,255,0.7);display:block;margin-bottom:7px;text-transform:uppercase;}
.form-input{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--r);color:var(--t1);
  font-family:var(--body);font-size:13px;
  outline:none;transition:all 0.3s;
}
