<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODE THE FUTURE | Supreme Intelligence Layer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=Space+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --cyan: #00f2ff;
            --bg: #030708;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 242, 255, 0.1);
            --font: 'Plus Jakarta Sans', sans-serif;
            --mono: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: var(--font); overflow-x: hidden; }

        #neural-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }

        /* Sleek Header */
        header { 
            position: fixed; width: 100%; padding: 15px 25px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; background: rgba(3, 7, 8, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 800; font-size: 0.9rem; letter-spacing: 3px; color: #fff; text-decoration: none; text-transform: uppercase; }
        .logo span { color: var(--cyan); }
        .status-pill { font-family: var(--mono); font-size: 10px; color: var(--cyan); border: 1px solid var(--cyan); padding: 4px 10px; border-radius: 4px; display: flex; align-items: center; gap: 6px; }
        .dot { width: 4px; height: 4px; background: var(--cyan); border-radius: 50%; animation: pulse 2s infinite; }

        /* Hero: The Sophisticated Intro */
        .hero { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .hero h1 { font-size: clamp(2.2rem, 10vw, 5rem); font-weight: 800; line-height: 1.1; margin-bottom: 15px; letter-spacing: -1px; }
        .hero p { max-width: 450px; color: #6d7d85; font-size: 0.9rem; line-height: 1.6; font-weight: 400; }

        /* Search Section - High Authority */
        .directory-section { padding: 40px 20px 100px; max-width: 1200px; margin: auto; }
        .search-container { position: relative; margin-bottom: 50px; }
        .search-input { 
            width: 100%; background: rgba(255, 255, 255, 0.02); 
            border: 1px solid var(--border); padding: 20px 25px; 
            border-radius: 12px; color: #fff; font-size: 1rem; 
            outline: none; transition: 0.4s; font-family: var(--font);
        }
        .search-input:focus { border-color: var(--cyan); box-shadow: 0 0 30px rgba(0, 242, 255, 0.05); }

        /* Filter Chips */
        .filters { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 20px; margin-bottom: 20px; scrollbar-width: none; }
        .filters::-webkit-scrollbar { display: none; }
        .pill { 
            white-space: nowrap; padding: 8px 18px; border-radius: 8px; 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            font-size: 11px; font-weight: 500; color: #6d7d85; cursor: pointer; transition: 0.3s;
        }
        .pill.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0, 242, 255, 0.05); }

        /* Grid & Credo-Style Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 25px; border-radius: 16px; position: relative; 
            transition: 0.4s cubic-bezier(0.2, 0, 0, 1); backdrop-filter: blur(10px);
        }
        .card:hover { border-color: var(--cyan); transform: translateY(-5px); }
        
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .card-meta { font-family: var(--mono); font-size: 10px; color: #444; text-transform: uppercase; }
        .trust-score { text-align: right; }
        .score-val { font-size: 1.4rem; font-weight: 800; color: var(--cyan); line-height: 1; }
        .score-label { font-size: 9px; color: #444; font-weight: 600; text-transform: uppercase; }

        .card h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; }
        .card p { font-size: 0.8rem; color: #6d7d85; line-height: 1.6; margin-bottom: 20px; font-weight: 400; height: 38px; overflow: hidden; }

        /* Credo Style Metrics Bars */
        .metric-item { margin-bottom: 12px; }
        .metric-info { display: flex; justify-content: space-between; font-size: 9px; color: #444; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .bar-bg { height: 2px; width: 100%; background: #111; border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--cyan); transition: 1.5s ease-out; }

        .card-footer { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .cat-tag { font-size: 9px; font-weight: 700; color: var(--cyan); text-transform: uppercase; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        @media (max-width: 768px) {
            header { padding: 15px 20px; }
            .hero { height: 50vh; padding-top: 80px; }
            .hero h1 { font-size: 2.2rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<canvas id="neural-canvas"></canvas>

<header>
    <a href="#" class="logo">NODE <span>THE FUTURE</span></a>
    <div class="status-pill"><div class="dot"></div> AUDIT ACTIVE</div>
</header>

<section class="hero">
    <h1>Autonomous Intelligence <br> Trust Protocol</h1>
    <p>The sovereign authority for AI reputation, technical audit, and model verification. Ensuring human-agent alignment in the autonomous era.</p>
</section>

<div class="directory-section">
    <div class="search-container">
        <input type="text" id="search" class="search-input" placehold
