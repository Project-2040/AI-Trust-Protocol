<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom AI</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #121212; color: white; }
        #chat-box { width: 90%; max-width: 500px; height: 400px; border: 1px solid #333; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #1e1e1e; border-radius: 8px; }
        .input-area { display: flex; width: 90%; max-width: 500px; }
        input { flex: 1; padding: 10px; border-radius: 5px 0 0 5px; border: none; outline: none; }
        button { padding: 10px; background: #007bff; color: white; border: none; border-radius: 0 5px 5px 0; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Axiom AI</h2>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type something...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = inputField.value;
            if (!message) return;

            chatBox.innerHTML += `<div><b>You:</b> ${message}</div>`;
            inputField.value = '';

            try {
                // EKHANE FIX KORA HOYECHE: .js bad deya hoyeche
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await res.json();
                chatBox.innerHTML += `<div><b>AI:</b> ${data.response}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (err) {
                chatBox.innerHTML += `<div><b>System:</b> Error connecting to AI.</div>`;
            }
        }
    </script>
</body>
</html>
