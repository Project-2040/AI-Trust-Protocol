<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxiomChain | The 0.1% AI Trust Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .hero-gradient { background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%); }
        .text-glow { text-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="hero-gradient min-h-screen flex flex-col items-center">

    <nav class="w-full max-w-7xl flex justify-between items-center px-8 py-8">
        <div class="text-xl font-black tracking-tighter">AXIOM<span class="text-cyan-400">CHAIN</span></div>
        <div class="text-[10px] uppercase tracking-widest text-cyan-400 border border-cyan-400/30 px-3 py-1 rounded-full bg-cyan-400/5">Network: Hedera Active</div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center text-center px-6">
        <div class="inline-block px-4 py-1 mb-6 glass-panel rounded-full text-[10px] font-bold tracking-widest text-gray-400 uppercase">Vision 2040 Protocol</div>
        <h1 class="text-6xl md:text-8xl font-black mb-6 tracking-tight text-glow">VALIDATE <br><span class="text-gray-600">EVERYTHING.</span></h1>
        <p class="max-w-2xl text-gray-400 text-lg mb-10 leading-relaxed font-light">The first autonomous trust layer for AI verification. Powered by Hedera and MD. Sariful Sheikh Jenon's Vision.</p>
        
        <div class="flex flex-col md:flex-row gap-4">
            <button class="bg-white text-black font-bold px-10 py-4 rounded-xl text-sm hover:scale-105 transition-transform">INITIALIZE SYSTEM</button>
            <button class="glass-panel text-white font-medium px-10 py-4 rounded-xl text-sm hover:bg-white/5">VIEW LEDGER</button>
        </div>
    </main>

    <footer class="w-full border-t border-white/5 py-10 text-center">
        <p class="text-[10px] text-gray-600 tracking-widest uppercase font-bold">Founder: MD. SARIFUL SHEIKH JENON | 2026-2040</p>
    </footer>

</body>
</html>
